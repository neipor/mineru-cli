name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build matrix — one job per target platform
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64  (static musl binary — runs on any Linux distro)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest

          # Linux ARM64  (static musl binary — Raspberry Pi, AWS Graviton, etc.)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest

          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-13

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Cargo registry + build artefacts for faster re-runs
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-

      # Install musl-tools for the native x86_64-musl build
      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      # Install `cross` for ARM64 Linux cross-compilation
      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross != true
        run: cargo build --release --locked --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/mineru || true

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGING="mineru-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$STAGING"
          cp target/${{ matrix.target }}/release/mineru "$STAGING/"
          cp README.md "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "mineru-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory $staging
          Copy-Item "target\${{ matrix.target }}\release\mineru.exe" "$staging\"
          Copy-Item "README.md" "$staging\"
          Compress-Archive -Path "$staging\*" -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS Universal Binary  (lipo x86_64 + aarch64 → universal)
  # ─────────────────────────────────────────────────────────────────────────────
  universal-macos:
    name: macOS Universal Binary
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS ARM64
        uses: actions/download-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: dl/arm64

      - name: Download macOS x86_64
        uses: actions/download-artifact@v4
        with:
          name: x86_64-apple-darwin
          path: dl/x86_64

      - name: Build universal binary
        shell: bash
        run: |
          tar xzf dl/arm64/*.tar.gz  -C dl/arm64  --strip-components=1
          tar xzf dl/x86_64/*.tar.gz -C dl/x86_64 --strip-components=1

          STAGING="mineru-${{ github.ref_name }}-universal-apple-darwin"
          mkdir "$STAGING"
          lipo -create -output "$STAGING/mineru" \
            dl/arm64/mineru \
            dl/x86_64/mineru
          lipo -info "$STAGING/mineru"
          cp README.md "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-apple-darwin
          path: ${{ env.ASSET }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, universal-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort
          ls -lh artifacts/*/*

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) \
            -exec sha256sum {} \; | sed 's|.*/||' | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "mineru ${{ github.ref_name }}"
          body: |
            ## mineru ${{ github.ref_name }}

            CLI tool to convert PDFs, images and Office documents to LLM-friendly Markdown
            using the [MinerU OCR](https://huggingface.co/spaces/opendatalab/MinerU) HuggingFace Space.

            ### Install

            **macOS / Linux**
            ```bash
            # macOS (Universal — works on both Intel and Apple Silicon)
            curl -Lo mineru.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mineru-${{ github.ref_name }}-universal-apple-darwin.tar.gz
            tar xzf mineru.tar.gz && sudo mv mineru-*/mineru /usr/local/bin/

            # Linux x86_64
            curl -Lo mineru.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mineru-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz
            tar xzf mineru.tar.gz && sudo mv mineru-*/mineru /usr/local/bin/

            # Linux ARM64
            curl -Lo mineru.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mineru-${{ github.ref_name }}-aarch64-unknown-linux-musl.tar.gz
            tar xzf mineru.tar.gz && sudo mv mineru-*/mineru /usr/local/bin/
            ```

            **Windows** — download the `.zip`, extract, and add `mineru.exe` to your `PATH`.

            ### Usage
            ```bash
            mineru paper.pdf                    # Markdown to stdout
            mineru scan.pdf --ocr --lang en     # Force OCR
            mineru *.pdf -f json -o ./output/   # Batch → JSON
            mineru report.pdf -f plain -q | llm "Summarize:"
            ```

            ### SHA256 checksums
            See `SHA256SUMS.txt` attached below.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/SHA256SUMS.txt
